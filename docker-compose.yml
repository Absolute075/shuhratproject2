version: "3.8"

services:
  backend:
    build: ./backend
    container_name: eimun-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/app/data
    networks:
      - eimun

  frontend:
    build: ./frontend
    container_name: eimun-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - eimun

networks:
  eimun:
    driver: bridge
