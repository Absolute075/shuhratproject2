services:
  permitpulse:
    build:
      context: .
      dockerfile: Dockerfile
    image: permitpulse:latest
    ports:
      - "8090:8090"
    env_file:
      - backend/.env
    environment:
      BACKEND_ADDR: "0.0.0.0:8090"
      APPLICATION_STORE_PATH: "/data"
    volumes:
      - permitpulse_data:/data
    restart: unless-stopped

volumes:
  permitpulse_data:
